<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrfectHub 🐱 - Your Ultimate Cat Paradise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #9D84B7;
            --primary-light: #C4A4E0;
            --secondary: #FFB347;
            --secondary-light: #FF8C69;
            --accent: #A8E6CF;
            --bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --text-light: #a0a0a0;
            --shadow: rgba(157, 132, 183, 0.3);
            --border-radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
        }

        /* Full Screen Cat Display */
        .cat-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 1;
        }

        .cat-display {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Dual image system for smooth transitions */
        .cat-image {
            position: absolute;
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .cat-image.active {
            opacity: 1;
            z-index: 2;
        }

        .loading {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 1;
        }

        .loading.hidden {
            display: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--primary-light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating Header */
        .header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 1rem;
            align-items: center;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            user-select: none;
        }

        .header-divider {
            width: 2px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Action Button in Header */
        .action-btn {
            background: rgba(157, 132, 183, 0.2);
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .action-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 132, 183, 0.4);
        }

        .action-btn.active {
            background: var(--primary);
        }

        /* Floating Action Panel */
        .action-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 200;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(30px);
            border-radius: var(--border-radius);
            padding: 2rem;
            min-width: 400px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(157, 132, 183, 0.3);
        }

        .action-panel.active {
            opacity: 1;
            pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .panel-close {
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .panel-close:hover {
            color: var(--text);
        }

        .control-group {
            margin-bottom: 1.5rem;
        }

        .control-label {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: block;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent) 0%, #90D4BA 100%);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        input[type="text"], select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid rgba(226, 232, 240, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text);
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .tag-suggestions {
            position: absolute;
            background: rgba(26, 26, 26, 0.98);
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            margin-top: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 10;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .tag-suggestion {
            padding: 0.8rem;
            cursor: pointer;
            transition: background 0.2s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tag-suggestion:hover {
            background: var(--primary-light);
            color: white;
        }

        /* Navigation Controls - Bottom Center */
        .nav-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 1rem;
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            padding: 1rem 1.5rem;
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0.5rem;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(157, 132, 183, 0.3);
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* Upload Button */
        .upload-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 179, 71, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 99;
        }

        .upload-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(255, 179, 71, 0.6);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(157, 132, 183, 0.3);
        }

        .modal-close {
            float: right;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-light);
        }

        /* HTTP Cats Grid */
        .content-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            z-index: 150;
            padding: 100px 20px 20px;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .content-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .http-grid, .breed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .http-card, .breed-card {
            background: rgba(26, 26, 26, 0.8);
            border-radius: var(--border-radius);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(157, 132, 183, 0.2);
        }

        .http-card:hover, .breed-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px var(--shadow);
            border-color: var(--primary);
        }

        .http-card img, .breed-card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 0.5rem;
        }

        .http-code {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .breed-info {
            padding: 0.5rem 0;
        }

        .breed-name {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .action-panel {
                min-width: 90vw;
                padding: 1.5rem;
            }

            .header {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            .nav-controls {
                gap: 0.5rem;
                padding: 0.8rem 1rem;
            }

            .nav-btn {
                font-size: 1.4rem;
                width: 40px;
                height: 40px;
            }

            .btn-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }
    </style>
</head>
<body>
    <!-- Full Screen Cat Display -->
    <div class="cat-container">
        <div class="cat-display">
            <img id="catImage1" class="cat-image active" alt="Cat">
            <img id="catImage2" class="cat-image" alt="Cat">
            <div id="loader" class="loading hidden">
                <div class="loading-spinner"></div>
                <p>Loading adorable cat...</p>
            </div>
        </div>
    </div>

    <!-- Floating Header -->
    <div class="header">
        <div class="logo">🐱 PurrfectHub</div>
        <div class="header-divider"></div>
        <button class="action-btn" onclick="toggleActions()">✨ Actions</button>
        <button class="action-btn" onclick="showHTTPCats()">📊 HTTP</button>
        <button class="action-btn" onclick="showBreeds()">🐈 Breeds</button>
    </div>

    <!-- Navigation Controls -->
    <div class="nav-controls">
        <button class="nav-btn" onclick="loadRandomCat()" title="Random Cat">🎲</button>
        <button class="nav-btn" onclick="loadRandomGif()" title="Cat GIF">🎬</button>
        <button class="nav-btn" onclick="downloadCat()" title="Download">⬇️</button>
    </div>

    <!-- Action Panel -->
    <div id="actionPanel" class="action-panel">
        <div class="panel-header">
            <h2 class="panel-title">Cat Actions</h2>
            <span class="panel-close" onclick="toggleActions()">×</span>
        </div>

        <div class="control-group">
            <label class="control-label">✏️ Add Text to Cat</label>
            <input type="text" id="catText" placeholder="Enter your text...">
            <button class="btn btn-accent" onclick="loadCatWithText()">Generate Meme</button>
        </div>

        <div class="control-group" style="position: relative;">
            <label class="control-label">🏷️ Filter by Tag</label>
            <input type="text" id="tagInput" placeholder="Search tags..." oninput="searchTags()">
            <div id="tagSuggestions" class="tag-suggestions" style="display:none;"></div>
            <button class="btn" onclick="loadCatByTag()">Find by Tag</button>
        </div>

        <div class="control-group">
            <label class="control-label">😊 Mood-Based Cat</label>
            <select id="moodSelect">
                <option value="happy">😊 Happy</option>
                <option value="sad">😢 Sad</option>
                <option value="angry">😠 Angry</option>
                <option value="curious">🤔 Curious</option>
                <option value="sleepy">😴 Sleepy</option>
                <option value="excited">🤩 Excited</option>
            </select>
            <button class="btn btn-secondary" onclick="loadCatByMood()">Find Mood Cat</button>
        </div>

        <div class="control-group">
            <label class="control-label">🎲 Quick Actions</label>
            <div class="btn-grid">
                <button class="btn" onclick="loadRandomCat()">Random Cat</button>
                <button class="btn btn-secondary" onclick="loadRandomGif()">Cat GIF</button>
            </div>
        </div>
    </div>

    <!-- Content Overlays -->
    <div id="httpOverlay" class="content-overlay">
        <div id="httpGrid" class="http-grid"></div>
    </div>

    <div id="breedsOverlay" class="content-overlay">
        <div id="breedsGrid" class="breed-grid"></div>
    </div>

    <!-- Upload Button -->
    <button class="upload-btn" onclick="openUploadModal()" title="Upload Your Cat">📤</button>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeUploadModal()">×</span>
            <h2>Upload Your Cat 🐱</h2>
            <form id="uploadForm" style="margin-top: 1.5rem;">
                <input type="file" id="fileInput" accept="image/*" style="margin-bottom: 1rem;">
                <input type="text" id="uploadTags" placeholder="Add tags (comma separated)">
                <button type="submit" class="btn" style="margin-top: 1rem;">Upload</button>
            </form>
            <div id="uploadMessage" style="margin-top: 1rem; text-align: center;"></div>
        </div>
    </div>

    <script>
        const CATAAS = "https://cataas.com";
        
        // Dual image system for smooth transitions
        let currentImageIndex = 0;
        const images = [
            document.getElementById('catImage1'),
            document.getElementById('catImage2')
        ];
        
        // Preload cache
        const blobCache = new Map();
        const preloadQueueSize = 3;
        let preloadRunning = false;
        let allTags = [];

        // Get current and next image elements
        function getCurrentImage() {
            return images[currentImageIndex];
        }

        function getNextImage() {
            return images[1 - currentImageIndex];
        }

        function switchImage() {
            currentImageIndex = 1 - currentImageIndex;
        }

        // Smooth cat display with dual image system
        function displayCat(url) {
            const nextImg = getNextImage();
            const currentImg = getCurrentImage();

            // Preload in hidden image
            nextImg.onload = () => {
                // Fade out current, fade in next
                currentImg.classList.remove('active');
                nextImg.classList.add('active');
                switchImage();
                hideLoading();
            };

            nextImg.onerror = () => {
                console.error('Failed to load image');
                hideLoading();
            };

            nextImg.src = url;
        }

        // Smart loader with caching
        function showFrom(urlBase, cachePrefix, forceShow = false) {
            const cached = getNextFromCache(cachePrefix);

            if (cached) {
                displayCat(cached);
                startPreload(urlBase, cachePrefix);
                return;
            }

            if (forceShow) showLoading();
            const url = `${urlBase}?_=${Math.random()}`;
            displayCat(url);
            startPreload(urlBase, cachePrefix);
        }

        function getNextFromCache(cachePrefix) {
            for (let i = 0; i < preloadQueueSize; i++) {
                const key = `${cachePrefix}_${i}`;
                if (blobCache.has(key)) {
                    const img = blobCache.get(key);
                    blobCache.delete(key);
                    return img;
                }
            }
            return null;
        }

        async function startPreload(urlBase, cachePrefix) {
            if (preloadRunning) return;
            preloadRunning = true;

            for (let i = 0; i < preloadQueueSize; i++) {
                await prefetchNext(urlBase, `${cachePrefix}_${i}`);
            }

            preloadRunning = false;
        }

        async function prefetchNext(urlBase, cacheKey) {
            const finalUrl = `${urlBase}?_=${Math.random()}`;

            try {
                const res = await fetch(finalUrl);
                if (!res.ok) return;

                const blob = await res.blob();
                const objectUrl = URL.createObjectURL(blob);

                if (blobCache.has(cacheKey)) {
                    URL.revokeObjectURL(blobCache.get(cacheKey));
                }

                blobCache.set(cacheKey, objectUrl);
            } catch (e) {
                console.error('Prefetch failed:', e);
            }
        }

        // Loading state
        function showLoading() {
            document.getElementById('loader').classList.remove('hidden');
        }

        function hideLoading() {
            document.getElementById('loader').classList.add('hidden');
        }

        // Cat loading functions
        function loadRandomCat() {
            showFrom(`${CATAAS}/cat`, "rand_pic");
            closeAllOverlays();
        }

        function loadRandomGif() {
            showFrom(`${CATAAS}/cat/gif`, "rand_gif");
            closeAllOverlays();
        }

        function loadCatWithText() {
            const text = document.getElementById('catText').value.trim();
            if (!text) return alert("Enter some text!");
            
            showFrom(`${CATAAS}/cat/says/${encodeURIComponent(text)}`, `text_${text}`);
            toggleActions();
        }

        function loadCatByTag() {
            const tag = document.getElementById('tagInput').value.trim();
            if (!tag) return alert("Enter a tag!");
            
            showFrom(`${CATAAS}/cat/${encodeURIComponent(tag)}`, `tag_${tag}`);
            toggleActions();
        }

        function loadCatByMood() {
            const mood = document.getElementById('moodSelect').value;
            const moodTags = {
                happy: 'cute,funny',
                sad: 'cute,sleep',
                angry: 'funny,grumpy',
                curious: 'cute',
                sleepy: 'sleep,cute',
                excited: 'funny,cute'
            };
            const tags = moodTags[mood] || 'cute';
            showFrom(`${CATAAS}/cat?tags=${tags}`, `mood_${mood}`);
            toggleActions();
        }

        // Download current cat
        function downloadCat() {
            const currentImg = getCurrentImage();
            const link = document.createElement('a');
            link.href = currentImg.src;
            link.download = `purrfect-cat-${Date.now()}.jpg`;
            link.click();
        }

        // UI Controls
        function toggleActions() {
            const panel = document.getElementById('actionPanel');
            panel.classList.toggle('active');
        }

        function closeAllOverlays() {
            document.getElementById('actionPanel').classList.remove('active');
            document.getElementById('httpOverlay').classList.remove('active');
            document.getElementById('breedsOverlay').classList.remove('active');
        }

        // Tag search
        async function loadTags() {
            try {
                // Hardcoded common tags since we're going direct to CATAAS
                allTags = ['cute', 'funny', 'grumpy', 'sleeping', 'kitten', 'black', 'white', 
                          'orange', 'playful', 'lazy', 'fluffy', 'small', 'big', 'fat', 'says'];
            } catch (error) {
                console.error('Failed to load tags:', error);
            }
        }

        function searchTags() {
            const query = document.getElementById('tagInput').value.trim();
            if (!query) {
                document.getElementById('tagSuggestions').style.display = 'none';
                return;
            }

            const filtered = allTags.filter(tag => 
                tag.toLowerCase().includes(query.toLowerCase())
            ).slice(0, 10);
            
            const suggestionsDiv = document.getElementById('tagSuggestions');
            if (filtered.length > 0) {
                suggestionsDiv.innerHTML = filtered.map(tag => 
                    `<div class="tag-suggestion" onclick="selectTag('${tag}')">${tag}</div>`
                ).join('');
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        }

        function selectTag(tag) {
            document.getElementById('tagInput').value = tag;
            document.getElementById('tagSuggestions').style.display = 'none';
        }

        // HTTP Cats
        function showHTTPCats() {
            const codes = [100, 200, 201, 204, 206, 301, 302, 304, 307, 400, 401, 403, 404, 
                          405, 406, 408, 410, 413, 414, 418, 429, 500, 502, 503, 504];
            const grid = document.getElementById('httpGrid');
            
            grid.innerHTML = codes.map(code => `
                <div class="http-card" onclick="showHTTPCat(${code})">
                    <img src="https://http.cat/${code}.jpg" alt="HTTP ${code}" loading="lazy">
                    <div class="http-code">${code}</div>
                </div>
            `).join('');
            
            closeAllOverlays();
            document.getElementById('breedsOverlay').classList.add('active');
        }

        // Upload modal
        function openUploadModal() {
            document.getElementById('uploadModal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const tags = document.getElementById('uploadTags').value;
            const messageDiv = document.getElementById('uploadMessage');

            if (!fileInput.files[0]) {
                messageDiv.innerHTML = '<p style="color: #FF8C69;">Please select a file!</p>';
                return;
            }

            // For direct implementation without backend
            // You can upload to imgur or similar service here
            messageDiv.innerHTML = '<p>Upload feature requires backend configuration.</p>';
            
            // When backend is ready, uncomment this:
            /*
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            messageDiv.innerHTML = '<p>Uploading...</p>';

        });

        // Close overlays on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAllOverlays();
            }
        });

        // Click outside to close action panel
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('actionPanel');
            const actionBtn = document.querySelector('.action-btn');
            
            if (!panel.contains(e.target) && !e.target.classList.contains('action-btn')) {
                if (panel.classList.contains('active') && !actionBtn) {
                    panel.classList.remove('active');
                }
            }
        });

        // Initialize on load
        window.addEventListener('load', () => {
            loadTags();
            
            // Preload cats for instant display
            startPreload(`${CATAAS}/cat`, "rand_pic");
            startPreload(`${CATAAS}/cat/gif`, "rand_gif");

            // Show first cat after brief delay
            setTimeout(() => {
                loadRandomCat();
            }, 100);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Space or Right Arrow - Next cat
            if (e.code === 'Space' || e.code === 'ArrowRight') {
                e.preventDefault();
                loadRandomCat();
            }
            // G - Random GIF
            if (e.code === 'KeyG') {
                loadRandomGif();
            }
            // A - Toggle actions
            if (e.code === 'KeyA') {
                toggleActions();
            }
            // D - Download
            if (e.code === 'KeyD') {
                downloadCat();
            }
        });
    </script>
