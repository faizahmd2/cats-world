<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F97316" />
  <title>🐾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9.144,300.900;1,9.144,300.900&family=Instrument+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    button,
    input,
    textarea {
      font: inherit
    }

    button {
      border: 0;
      background: none;
      cursor: pointer
    }

    img {
      display: block;
      max-width: 100%
    }

    :root {
      --brand: #f97316;
      --brand-d: #ea580c;
      --brand-s: #fff0e6;
      --rose: #f43f5e;
      --teal: #14b8a6;
      --gold: #fbbf24;
      --ink: #1c1410;
      --ink2: #4b3b30;
      --ink3: #927b6c;
      --ink4: #c4b8b0;
      --bg: #fffbf7;
      --surf: #fff;
      --surf2: #f7f1eb;
      --surf3: #efe7df;
      --line: #e8ddd4;
      --r: 14px;
      --r2: 22px;
      --shadow: 0 2px 12px rgba(0, 0, 0, .08);
      --shadow2: 0 12px 40px rgba(0, 0, 0, .14);
      --nav-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px)
    }

    [data-dark] {
      --bg: #100d0a;
      --surf: #1a1410;
      --surf2: #221c16;
      --surf3: #2c2218;
      --line: #332820;
      --ink: #f5ede4;
      --ink2: #d8c2aa;
      --ink3: #8c7162;
      --ink4: #4a3828;
      --brand-s: rgba(249, 115, 22, .16);
      --shadow: 0 2px 12px rgba(0, 0, 0, .4);
      --shadow2: 0 12px 40px rgba(0, 0, 0, .55)
    }

    html,
    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: "Instrument Sans", system-ui, sans-serif
    }

    #root {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100svh;
      padding-bottom: calc(var(--nav-h) + var(--safe-b) + 16px)
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 251, 247, .86);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    [data-dark] .topbar {
      background: rgba(16, 13, 10, .86)
    }

    .logo {
      font-family: Fraunces, serif;
      font-size: 24px;
      font-weight: 900;
      color: var(--brand);
      display: flex;
      gap: 7px;
      align-items: center
    }

    .logo span {
      animation: wag 2.6s infinite ease-in-out;
      transform-origin: 50% 80%
    }

    @keyframes wag {

      0%,
      100% {
        transform: rotate(-10deg)
      }

      50% {
        transform: rotate(10deg)
      }
    }

    .top-actions {
      display: flex;
      gap: 6px;
      align-items: center
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--ink2)
    }

    .icon-btn:hover {
      background: var(--surf2)
    }

    .icon-btn svg {
      width: 21px;
      height: 21px;
      stroke-width: 1.9
    }

    .page {
      padding: 14px
    }

    .section-title {
      font-family: Fraunces, serif;
      font-size: 23px;
      font-weight: 900;
      margin: 6px 0 14px
    }

    .section-sub {
      font-size: 13px;
      color: var(--ink3);
      line-height: 1.55;
      margin: -8px 0 16px
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: rgba(255, 251, 247, .94);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      display: flex;
      z-index: 60
    }

    [data-dark] .bottom-nav {
      background: rgba(16, 13, 10, .94)
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--ink3);
      font-size: 10px;
      font-weight: 700
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.7
    }

    .nav-item.active {
      color: var(--brand)
    }

    .nav-item.active svg {
      stroke-width: 2.3
    }

    .tag-scroll {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding: 2px 14px 12px;
      margin: 0 -14px
    }

    .tag-chip {
      flex: 0 0 auto;
      border: 1.5px solid var(--line);
      background: var(--surf);
      color: var(--ink2);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 13px;
      font-weight: 700
    }

    .tag-chip.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink)
    }

    .cat-card {
      background: var(--surf);
      border: 1px solid var(--line);
      border-radius: var(--r2);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      animation: up .35s both
    }

    @keyframes up {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--brand-s);
      font-size: 22px
    }

    .card-user {
      flex: 1
    }

    .name {
      font-weight: 900;
      font-size: 14px
    }

    .meta {
      font-size: 12px;
      color: var(--ink3);
      margin-top: 1px
    }

    .badge {
      font-size: 10px;
      font-weight: 900;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--brand-s);
      color: var(--brand)
    }

    .img-wrap {
      position: relative;
      background: var(--surf2);
      aspect-ratio: 1/1;
      overflow: hidden
    }

    .cat-img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .heart-burst {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 78px;
      pointer-events: none;
      animation: heart .7s both
    }

    @keyframes heart {
      0% {
        opacity: 0;
        transform: scale(.3)
      }

      35% {
        opacity: 1;
        transform: scale(1.1)
      }

      100% {
        opacity: 0;
        transform: scale(.85)
      }
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 10px 12px
    }

    .action-btn {
      height: 36px;
      min-width: 36px;
      border-radius: 999px;
      background: var(--surf2);
      color: var(--ink2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0 11px;
      font-size: 13px;
      font-weight: 800;
      transition: background .15s, color .15s, transform .1s
    }

    .action-btn:active { transform: scale(.93) }

    .action-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0
    }

    .action-btn.liked {
      color: #e11d48;
      background: rgba(225, 29, 72, .1)
    }

    .action-btn.liked svg { fill: #e11d48 }

    .action-btn.saved {
      color: var(--brand);
      background: var(--brand-s)
    }

    .action-btn.saved svg { fill: var(--brand) }

    .ml {
      margin-left: auto
    }

    .pop {
      animation: pop .35s
    }

    @keyframes pop {
      50% {
        transform: scale(1.18)
      }
    }

    .card-caption {
      padding: 0 14px 14px;
      font-size: 14px;
      line-height: 1.45
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 9px
    }

    .tag-pill {
      font-size: 12px;
      color: var(--brand);
      font-weight: 800
    }

    .inp {
      width: 100%;
      border: 1.5px solid var(--line);
      background: var(--surf2);
      border-radius: 13px;
      padding: 11px 13px;
      color: var(--ink);
      outline: none
    }

    .inp:focus {
      border-color: var(--brand)
    }

    textarea.inp {
      min-height: 88px;
      resize: vertical
    }

    .form-group {
      margin-bottom: 14px
    }

    .form-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 900;
      color: var(--ink3);
      margin-bottom: 6px
    }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--ink4);
      margin-top: 3px
    }

    .btn {
      border-radius: 13px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px
    }

    .btn-full {
      width: 100%
    }

    .btn-accent {
      background: var(--brand);
      color: #fff
    }

    .btn-accent:hover {
      background: var(--brand-d)
    }

    .btn-ghost {
      background: var(--surf2);
      color: var(--ink2)
    }

    .btn-primary {
      background: var(--ink);
      color: var(--bg)
    }

    .btn:disabled {
      opacity: .55;
      pointer-events: none
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .75s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .52);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
      overscroll-behavior: contain
    }

    .sheet {
      width: 100%;
      max-width: 480px;
      max-height: 92dvh;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      background: var(--surf);
      border-radius: 24px 24px 0 0;
      padding: 18px 18px calc(18px + var(--safe-b));
      box-shadow: var(--shadow2);
      animation: sheet .25s cubic-bezier(.32,0,.67,0) both
    }

    @keyframes sheet {
      from {
        transform: translateY(100%)
      }

      to {
        transform: none
      }
    }

    .sheet-handle {
      width: 38px;
      height: 4px;
      background: var(--line);
      border-radius: 99px;
      margin: 0 auto 18px
    }

    .auth-hero {
      text-align: center;
      margin-bottom: 16px
    }

    .auth-cat {
      width: 64px;
      height: 64px;
      border-radius: 22px;
      background: var(--brand-s);
      display: grid;
      place-items: center;
      margin: 0 auto 10px;
      font-size: 34px
    }

    .auth-hero h2 {
      font-family: Fraunces, serif;
      font-size: 24px
    }

    .auth-hero p {
      font-size: 13px;
      color: var(--ink3);
      line-height: 1.5;
      margin-top: 4px
    }

    .toast-wrap {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      pointer-events: none
    }

    .toast {
      background: var(--ink);
      color: var(--bg);
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: var(--shadow2);
      animation: toast .25s both
    }

    .toast.out {
      animation: toastOut .25s forwards
    }

    @keyframes toast {
      from {
        opacity: 0;
        transform: translateY(-10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(-8px)
      }
    }

    .empty {
      text-align: center;
      padding: 58px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px
    }

    .empty-emoji {
      font-size: 54px
    }

    .empty-title {
      font-family: Fraunces, serif;
      font-size: 19px;
      font-weight: 900
    }

    .empty-sub {
      font-size: 13px;
      color: var(--ink3);
      line-height: 1.55;
      max-width: 280px
    }

    .explore-grid {
      display: grid;
      gap: 12px
    }

    .explore-card {
      background: var(--surf);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow)
    }

    .explore-head {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .ec-emoji {
      font-size: 30px
    }

    .ec-title {
      font-family: Fraunces, serif;
      font-size: 17px;
      font-weight: 900
    }

    .ec-sub {
      font-size: 12px;
      color: var(--ink3);
      margin-top: 2px
    }

    .expand {
      padding-top: 14px
    }

    .prompt-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px
    }

    .prompt-chips {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 12px
    }

    .ai-card {
      background: var(--surf);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow)
    }

    .ai-card-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover
    }

    .ai-card-actions {
      display: flex;
      gap: 8px;
      padding: 12px
    }

    .mood-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px
    }

    .mood-btn {
      background: var(--surf2);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 10px 4px;
      font-size: 10px;
      font-weight: 800;
      color: var(--ink2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px
    }

    .mood-btn span {
      font-size: 22px
    }

    .upload-zone {
      border: 2px dashed var(--line);
      border-radius: 22px;
      background: var(--surf);
      padding: 34px 18px;
      text-align: center
    }

    .upload-zone.drag {
      border-color: var(--brand);
      background: var(--brand-s)
    }

    .upload-zone input {
      display: none
    }

    .upload-preview {
      position: relative;
      aspect-ratio: 1/1;
      border-radius: 18px;
      overflow: hidden;
      background: var(--surf2);
      margin-bottom: 14px
    }

    .upload-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .55);
      color: #fff
    }

    .progress-bar {
      height: 4px;
      background: var(--surf3);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 14px
    }

    .progress-fill {
      height: 100%;
      background: var(--brand);
      transition: width .25s
    }

    .saved-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px
    }

    .saved-thumb {
      position: relative;
      aspect-ratio: 1/1;
      overflow: hidden;
      background: var(--surf2)
    }

    .saved-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .saved-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .6);
      color: #fff
    }

    .saved-count {
      font-size: 12px;
      font-weight: 900;
      background: var(--surf2);
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--ink3)
    }

    .meme-canvas-wrap {
      border-radius: 18px;
      overflow: hidden;
      background: var(--surf2);
      margin-bottom: 12px
    }

    .template-scroll {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 4px
    }

    .template-chip {
      flex: 0 0 auto;
      background: var(--surf2);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 800;
      color: var(--ink2)
    }

    .font-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--ink3);
      font-weight: 800
    }

    .font-row input {
      flex: 1
    }

    .meme-actions {
      display: flex;
      gap: 8px
    }

    .divider {
      font-size: 11px;
      font-weight: 900;
      color: var(--ink3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin: 8px 0 10px
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px
    }

    .info-name {
      font-family: Fraunces, serif;
      font-size: 19px;
      font-weight: 900
    }

    .info-handle {
      font-size: 13px;
      color: var(--ink3)
    }

    .info-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px
    }

    .info-stat {
      background: var(--surf2);
      border-radius: 13px;
      padding: 10px;
      text-align: center
    }

    .info-stat-label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--ink3);
      font-weight: 900
    }

    .info-stat-val {
      font-size: 12px;
      font-weight: 900;
      margin-top: 3px
    }

    .caption-box,
    .fact-box {
      background: var(--surf2);
      border-radius: 15px;
      padding: 13px;
      margin-bottom: 13px
    }

    .caption-label,
    .fact-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 900;
      color: var(--ink3);
      margin-bottom: 6px
    }

    .caption-text,
    .fact-text {
      font-size: 14px;
      line-height: 1.5
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;
    const API_BASE = '';
    const api = async (path, opts = {}) => { try { const r = await fetch(API_BASE + path, opts); return r.ok ? r.json() : { ok: false, error: `HTTP ${r.status}` } } catch { return { ok: false, error: 'Network error' } } };
    const USER_KEY = 'purrfect_user_v1';
    function getLocalUser() { try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null') } catch { return null } }
    function setLocalUser(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)) }
    function clearLocalUser() { localStorage.removeItem(USER_KEY) }
    async function compressImageFile(file, maxSize = 1200, quality = .82) { const bitmap = await createImageBitmap(file); const side = Math.min(bitmap.width, bitmap.height); const sx = Math.floor((bitmap.width - side) / 2); const sy = Math.floor((bitmap.height - side) / 2); const c = document.createElement('canvas'); c.width = maxSize; c.height = maxSize; const ctx = c.getContext('2d'); ctx.drawImage(bitmap, sx, sy, side, side, 0, 0, maxSize, maxSize); const blob = await new Promise(res => c.toBlob(res, 'image/jpeg', quality)); return new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg' }) }
    const ToastCtx = createContext(() => { });
    function ToastProvider({ children }) { const [toasts, setToasts] = useState([]); const push = useCallback(msg => { const id = Math.random(); setToasts(p => [...p, { id, msg }]); setTimeout(() => { setToasts(p => p.map(t => t.id === id ? { ...t, out: true } : t)); setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 260) }, 2400) }, []); return <ToastCtx.Provider value={push}>{children}<div className="toast-wrap">{toasts.map(t => <div key={t.id} className={`toast${t.out ? ' out' : ''}`}>{t.msg}</div>)}</div></ToastCtx.Provider> }
    const useToast = () => useContext(ToastCtx);
    const seed_n = (n, m) => Math.abs(Math.sin(n * 999) * 10000 | 0) % m;
    const FIRSTS = [

        const PALETTES = [
          ['#FF6B6B','#fff'],['#FF922B','#fff'],['#FAB005','#1c1410'],

          ['#A9E34B','#1c1410'],
        ];

          let h = 0; const s = String(str);

    function CatCard({ index, catId, imageUrl, tags = [], initialLikes = 0, source = 'unsplash', type = 'cat', stable = false, fromApi = false, creatorNote = '', creatorUsername = '', userLiked = false, userSaved = false, onMemeClick, onShowInfo, onToast, onFeedUpdate }) {

        const [captionsPool, setCaptionsPool] = useState(CAPTIONS);

        useEffect(() => { 
            dark ? document.documentElement.setAttribute('data-dark', '') : document.documentElement.removeAttribute('data-dark'); 
        }, [dark]);

        // Fetch facts from catfact.ninja on page load
        useEffect(() => {
            async function loadFacts() {
                try {
                    const response = await fetch('https://catfact.ninja/facts?limit=20');
                    if (!response.ok) throw new Error('API unstable');
                    const result = await response.json();
                    if (result?.data?.length > 0) {
                        setCatFacts([...result.data.map(i => i.fact), ...CAT_FACTS_LOCAL]);
                    }
                } catch { /* keep local fallback */ }
            }
            loadFacts();
        }, []);

        const handleMeme = useCallback(cat => {
          // cat is always a stable object from CatCard (already uploaded to R2)
          // or a direct explore/mood click — wrap string just in case
          setMemeCat(typeof cat === 'string' ? { imageUrl: cat, catId: '', tags: [], source: 'unknown', type: 'cat' } : cat);
        }, []); 

        return (
            <ToastProvider>
                <CaptionsCtx.Provider value={captionsPool}>
                    <div className="topbar">
                        <div className="logo"><span>🐾</span></div>
                        <div className="top-actions">
                            {user?.username && <button className="tag-chip" onClick={() => { clearLocalUser(); setUser(null) }}>{user.username} ×</button>}
                            <button className="icon-btn" onClick={() => setDark(d => !d)}>{dark ? '☀️' : '🌙'}</button>
                        </div>
                    </div>

                    {tab === 'feed' && <FeedPage onMemeClick={handleMeme} onShowInfo={setInfo} />} 
                    {tab === 'explore' && <ExplorePage onMemeClick={handleMeme} onShowInfo={setInfo} />} 
                    {tab === 'memes' && <MemesPage onMemeClick={handleMeme} onShowInfo={setInfo} />} 
                    {tab === 'upload' && <UploadPage />} 
                    {tab === 'saved' && <SavedPage />}

                    <nav className="bottom-nav">
                        {NAV_ITEMS.map(i => (
                            <button key={i.id} className={`nav-item${tab === i.id ? ' active' : ''}`} onClick={() => setTab(i.id)}>
                                {i.icon}<span>{i.label}</span>
                            </button>
                        ))}
                    </nav>

                    {memeCat && <MemeModalWithToast cat={memeCat} onClose={() => setMemeCat(null)} />} 
                    {infoData && <InfoModal data={infoData} factsPool={catFacts} onClose={() => setInfo(null)} />}
                </CaptionsCtx.Provider>
            </ToastProvider>
        ); 
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<PatchedApp />);
  </script>
</body>

</html>
